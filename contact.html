<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Sohi Oregano Taste</title>
  <link rel="stylesheet" href="style.css"> 
  <link rel="stylesheet" href="form.css">
</head>
<body>

<header>
  <h1>Sohi Oregano Taste</h1>
  <p>Pure Spices • Rich Aroma • Authentic Taste</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="products.html">Products</a>
  <a href="contact.html">Contact</a>
</nav>

<section class="section">

  <h2>Place Your Spice Order</h2>

  <form class="contact-form"
        action="https://formspree.io/f/xbdwyqkg"
        method="POST">

    <input type="text"
           name="customer_name"
           placeholder="Your Name"
           required>

    <input type="tel"
           name="phone"
           placeholder="Phone Number"
           required>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <select name="spice" required>

      <option value="">Select Spice</option>
      <option value="Oregano">Oregano</option>
      <option value="Red Chilli">Red Chilli</option>
      <option value="Turmeric">Turmeric</option>
      <option value="Black Pepper">Black Pepper</option>

    </select>

    <input type="number"
           name="quantity"
           placeholder="Quantity"
           required>

    <textarea name="address"
              rows="4"
              placeholder="Delivery Address"
              required></textarea>

    <textarea name="message"
              rows="4"
              placeholder="Additional Message"></textarea>

    <button type="submit" class="btn">
      Order Now
    </button>

  </form>

</section>

<footer>
  <p>© 2026 Sohi Oregano Taste | All Rights Reserved</p>
</footer>

</body>
</html>
