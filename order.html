<section class="section">

  <h2>Place Your Order</h2>

  <form class="contact-form"
        action="https://formspree.io/f/maqvyrjk"
        method="POST">

    <input type="text"
           name="customer_name"
           placeholder="Your Name"
           required>

    <input type="tel"
           name="phone"
           placeholder="Phone Number"
           required>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

         name="oregano_quantity"
         min="0"
         placeholder="Quantity">

</div>

</div>
