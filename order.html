<section class="section">

  <h2>Place Your Order</h2>

  <form class="contact-form"
        action="https://formspree.io/f/mwvykger"
        method="POST">

    <input type="text"
           name="customer_name"
           placeholder="Your Name"
           required>

    <input type="tel"
           name="phone"
           placeholder="Phone Number"
           required>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <select name="spice" required>

      <option value="">Select Spice</option>

      <option value="Oregano">Oregano</option>

      <option value="Red Chilli">Red Chilli</option>

      <option value="Turmeric">Turmeric</option>

      <option value="Black Pepper">Black Pepper</option>

    </select>

    <input type="number"
           name="quantity"
           placeholder="Quantity (Packets)"
           required>

    <textarea name="address"
              rows="4"
              placeholder="Delivery Address"
              required></textarea>

    <textarea name="message"
              rows="4"
              placeholder="Additional Message"></textarea>

    <button type="submit" class="btn">
      Order Now
    </button>

  </form>

</section>
