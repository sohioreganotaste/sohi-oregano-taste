<section class="section">

  <h2>Place Your Order</h2>

  <form class="contact-form"
        action="https://formspree.io/f/maqvyrjk"
        method="POST">

    <input type="text"
           name="customer_name"
           placeholder="Your Name"
           required>

    <input type="tel"
           name="phone"
           placeholder="Phone Number"
           required>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <h2>Order Spices</h2>

<h3>Oregano</h3>
<input type="number"
       name="oregano_quantity"
       min="0"
       placeholder="Quantity">

<h3>Red Chilli</h3>
<input type="number"
       name="chilli_quantity"
       min="0"
       placeholder="Quantity">

<h3>Turmeric</h3>
<input type="number"
       name="turmeric_quantity"
       min="0"
       placeholder="Quantity">

<h3>Black Pepper</h3>
<input type="number"
       name="pepper_quantity"
       min="0"
       placeholder="Quantity">

    <textarea name="address"
              rows="4"
              placeholder="Delivery Address"
              required></textarea>

    <textarea name="message"
              rows="4"
              placeholder="Additional Message"></textarea>

    <button type="submit" class="btn">
      Order Now
    </button>

  </form>

</section>
